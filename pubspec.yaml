name: appplayer_core
description: AppPlayer Core — shared Flutter library for MCP server connection, bundle handling, and UI runtime orchestration.
version: 0.1.1
homepage: https://app-appplayer.github.io/makemind
repository: https://github.com/app-appplayer/appplayer_core
issue_tracker: https://github.com/app-appplayer/appplayer_core/issues

topics:
  - mcp
  - appplayer
  - bundle
  - ui
  - flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  mcp_client: ^2.0.0
  flutter_mcp_ui_core: ^0.3.1
  flutter_mcp_ui_runtime: ^0.4.3
  mcp_bundle: ^0.3.0
  uuid: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0
  fake_async: ^1.3.0
